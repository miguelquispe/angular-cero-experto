<h2 class="text-2xl font-bold mt-5">Buscar Gifs</h2>
<h2 class="text-sm text-gray-500">
  Buscar Gifs, por nombre, descripción o etiquetas
</h2>

<section class="flex flex-col gap-4">
  <input
    type="text"
    class="mt-3 border border-gray-300 rounded p-2"
    placeholder="Buscar Gifs..."
    (keyup.enter)="onSearch(txtSearch.value)"
    #txtSearch
  />
</section>

<section class="p-5">
  <gift-list [gifts]="gifs()"></gift-list>
</section>
